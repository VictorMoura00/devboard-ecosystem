<span
  class="tag"
  [class]="'tag--' + variant()"
  [class.tag--sm]="size() === 'sm'"
  [class.tag--disabled]="disabled()"
>
  @if (icon()) {
    <span class="tag__icon" aria-hidden="true">{{ icon() }}</span>
  }
  <span class="tag__hash">#</span>
  <span class="tag__label">{{ label() }}</span>
  @if (removable() && !disabled()) {
    <button type="button" class="tag__remove" (click)="onRemove($event)" aria-label="remove">×</button>
  }
</span>
