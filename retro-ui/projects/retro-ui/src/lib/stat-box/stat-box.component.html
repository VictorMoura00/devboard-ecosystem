<article [class]="boxClass()">
  <p class="stat-label">{{ label() }}</p>
  <strong class="stat-value">
    {{ value() }}
    @if (trend()) {
      <span class="stat-trend stat-trend--{{ trend() }}">{{ trendIcon() }}</span>
    }
  </strong>
  @if (sublabel()) {
    <span class="stat-sublabel">{{ sublabel() }}</span>
  }
</article>
